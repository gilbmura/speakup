{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card p-4 mt-4">
      <h4 class="fw-bold mb-1" style="color:var(--su-dark)"><i class="bi bi-person-plus me-2" style="color:var(--su-green)"></i>Create Account</h4>
      <p class="text-muted small mb-4">Join SpeakUp as a citizen reporter</p>

      {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/register" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" placeholder="Jean Claude Uwimana" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Phone <span class="text-muted fw-normal">(optional)</span></label>
          <input type="tel" name="phone" class="form-control" placeholder="+250 7xx xxx xxx">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
          <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required minlength="8">
          <div class="form-text">At least 8 characters.</div>
        </div>
        <button type="submit" class="btn btn-success w-100 mt-1">Create Account</button>
      </form>

      <hr class="my-3">
      <p class="text-center small text-muted mb-0">
        Already have an account? <a href="/login" class="text-success fw-semibold">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
